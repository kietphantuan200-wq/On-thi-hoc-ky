<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Học Tập - Kiệt Developer (Auto-Gen)</title>
    <style>
        :root { --primary: #8b5cf6; --gold: #fbbf24; --bg: #0b0f1a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .page { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tài khoản */
        .auth-container { text-align: center; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; margin-top: 20px; }
        #avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 15px; background: #0f172a; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }

        /* Menu */
        .sidebar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { cursor: pointer; color: #94a3b8; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        /* Giao diện môn học */
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .subject-btn { background: var(--card); border: 1px solid #334155; color: white; padding: 20px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        
        .header-test { background: var(--primary); color: white; padding: 20px; border-radius: 0 0 20px 20px; text-align: center; margin: -20px -20px 20px -20px; position: sticky; top: 0; z-index: 100; }
        .q-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #334155; border-radius: 10px; background: #0f172a; color: white; text-align: left; }
        
        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        #loading-overlay { display: none; text-align: center; padding: 20px; background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 2000; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="font-size: 50px; margin-bottom: 20px;">🧠</div>
    <h3 style="color: var(--primary);">AI ĐANG TỰ GIẢI & TẠO ĐỀ...</h3>
    <p>Dù đề cương không có câu hỏi, AI cũng sẽ tự tạo cho Kiệt!</p>
</div>

<div id="page-intro" class="page active">
    <h2 style="text-align: center;">🚀 Kiệt Developer Profile</h2>
    <div class="auth-container">
        <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('avatarInput').click()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 10px; border-radius:5px; cursor:pointer; margin-bottom:15px;">Chọn ảnh đại diện</button>
        <input type="text" id="userName" placeholder="Nhập tên của Kiệt để bắt đầu...">
        <button class="btn btn-primary" onclick="saveProfile()">VÀO HỌC NGAY</button>
    </div>
</div>

<div id="page-test" class="page">
    <div id="subject-selection">
        <h2>📚 Chọn môn học đề cương:</h2>
        <div class="subject-grid">
            <button class="subject-btn" onclick="selectSubject('Tiếng Anh')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Tiếng Anh</button>
            <button class="subject-btn" onclick="selectSubject('Toán Học')">🔢 Toán Học</button>
            <button class="subject-btn" onclick="selectSubject('Ngữ Văn')">📖 Ngữ Văn</button>
            <button class="subject-btn" onclick="selectSubject('KHTN')">🧪 KHTN</button>
            <button class="subject-btn" onclick="selectSubject('Lịch Sử - Địa Lý')">🌍 Sử - Địa</button>
            <button class="subject-btn" onclick="selectSubject('GDCD')">⚖️ GDCD</button>
        </div>
    </div>

    <div id="upload-section" style="display:none">
        <h2 id="current-subject-title"></h2>
        <div class="auth-container">
            <p>📷 Chụp đề cương (Có câu hỏi hoặc chỉ có kiến thức đều được):</p>
            <input type="file" id="examImages" accept="image/*" multiple>
            <button class="btn btn-primary" style="margin-top:20px" onclick="generateTestWithAI()">AI TỰ GIẢI & QUÉT ĐỀ</button>
            <button class="btn" style="background:transparent; color:#94a3b8" onclick="location.reload()">← Quay lại</button>
        </div>
    </div>

    <div id="test-screen" style="display:none">
        <div class="header-test" id="test-header-info">Đang kiểm tra kiến thức...</div>
        <div id="question-area"></div>
        <div style="display:flex; gap:10px; padding: 10px;">
            <button class="btn" style="background:#ef4444; color:white; flex:1" onclick="location.reload()">Thoát</button>
            <button class="btn" style="background:#22c55e; color:white; flex:1" onclick="submitTest()">Nộp bài</button>
        </div>
    </div>
</div>

<div id="page-rank" class="page">
    <h2>🏆 Thành Tích Của Kiệt</h2>
    <div id="rank-list"></div>
</div>

<div class="sidebar">
    <div class="nav-item active" onclick="showPage('intro', this)">Cá nhân</div>
    <div class="nav-item" onclick="showPage('test', this)">Bài Test</div>
    <div class="nav-item" onclick="showPage('rank', this)">Hạng</div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = 'AIzaSyABbYdh28LB-C1vTeHkERmJPftCcGB3My8 '; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    let currentSubject = '';
    let generatedQuestions = [];
    let userAnswers = {};
    let userProfile = { name: '', avatar: '' };

    document.getElementById('avatarInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('avatar-preview').src = reader.result;
            userProfile.avatar = reader.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    window.saveProfile = () => {
        const name = document.getElementById('userName').value;
        if(!name) { alert("Kiệt ơi, nhập tên mới vào được!"); return; }
        userProfile.name = name;
        showPage('test', document.querySelectorAll('.nav-item')[1]);
    };

    window.showPage = (pageId, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    window.selectSubject = (sub) => {
        if(!userProfile.name) { alert("Nhập tên trước nhé Kiệt!"); showPage('intro', document.querySelectorAll('.nav-item')[0]); return; }
        currentSubject = sub;
        document.getElementById('subject-selection').style.display = 'none';
        document.getElementById('upload-section').style.display = 'block';
        document.getElementById('current-subject-title').innerText = "Môn: " + sub;
    };

    window.generateTestWithAI = async () => {
        const files = document.getElementById('examImages').files;
        if(files.length === 0) { alert("Chưa có ảnh đề cương Kiệt ơi!"); return; }
        document.getElementById('loading-overlay').style.display = 'flex';
        
        try {
            // CÂU LỆNH SIÊU THÔNG MINH CHO AI
            const prompt = `Bạn là chuyên gia giáo dục của Kiệt. Hãy đọc tất cả ảnh đề cương môn ${currentSubject} lớp 7. 
            1. Nếu đề cương có câu hỏi trắc nghiệm, hãy trích xuất chúng.
            2. Nếu đề cương chỉ có kiến thức/lý thuyết, hãy tự giải nghĩa kiến thức đó và TỰ TẠO ra các câu hỏi trắc nghiệm khách quan để kiểm tra sự hiểu biết của Kiệt.
            Tạo ra CÀNG NHIỀU CÂU HỎI CÀNG TỐT. Trả về định dạng JSON: [{"q":"câu hỏi","a":["đáp án 1","đáp án 2","đáp án 3"],"c":vị trí đúng}]. Chỉ trả về JSON.`;
            
            const imageParts = await Promise.all([...files].map(fileToGenerativePart));
            const result = await model.generateContent([prompt, ...imageParts]);
            const responseText = result.response.text();
            
            const jsonStart = responseText.indexOf('[');
            const jsonEnd = responseText.lastIndexOf(']') + 1;
            generatedQuestions = JSON.parse(responseText.substring(jsonStart, jsonEnd));

            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('test-screen').style.display = 'block';
            document.getElementById('test-header-info').innerText = `${currentSubject} - ${generatedQuestions.length} Câu hỏi`;
            initQuestions();
        } catch (e) {
            alert("Lỗi AI! Kiệt kiểm tra lại API Key nhé.");
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    async function fileToGenerativePart(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve({ inlineData: { data: reader.result.split(',')[1], mimeType: file.type } });
            reader.readAsDataURL(file);
        });
    }

    function initQuestions() {
        const area = document.getElementById('question-area');
        area.innerHTML = '';
        userAnswers = {};
        generatedQuestions.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<b style="color:var(--primary)">Câu ${idx+1}:</b> ${item.q}<br>` + 
                item.a.map((opt, i) => `<button class="option" id="q${idx}o${i}" onclick="selectAnswer(${idx},${i})">${opt}</button>`).join('');
            area.appendChild(card);
        });
    }

    window.selectAnswer = (qIdx, oIdx) => {
        userAnswers[qIdx] = oIdx;
        const options = document.querySelectorAll(`[id^="q${qIdx}o"]`);
        options.forEach(opt => {
            opt.style.borderColor = '#334155';
            opt.style.background = '#0f172a';
        });
        const selected = document.getElementById(`q${qIdx}o${oIdx}`);
        selected.style.borderColor = '#8b5cf6';
        selected.style.background = '#1e3a8a';
    };

    window.submitTest = () => {
        let score = 0;
        generatedQuestions.forEach((item, i) => { if(userAnswers[i] === item.c) score++; });
        const ratio = score / generatedQuestions.length;
        const rank = ratio >= 0.9 ? "Thánh Tri Thức 👑" : ratio >= 0.7 ? "Huyền Thoại 🎖️" : "Chiến Binh ⚔️";
        
        const list = document.getElementById('rank-list');
        list.innerHTML = `<div style="background:var(--card); padding:15px; margin-bottom:10px; border-radius:12px; display:flex; align-items:center; gap:15px; border-left:5px solid var(--gold);">
            <img src="${userProfile.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
            <div><b>${userProfile.name}</b><br><small>${currentSubject}: ${score}/${generatedQuestions.length} - ${rank}</small></div>
        </div>` + list.innerHTML;
        
        alert(`Kiệt xong rồi! Điểm: ${score}/${generatedQuestions.length}\nHạng: ${rank}`);
        location.reload();
    };
</script>
</body>
</html>
